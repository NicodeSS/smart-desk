substitutions:
  name: nicode-smart-desk
  friendly_name: Nicode's Smart Desk

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  name_add_mac_suffix: false
  project:
    name: esphome.web
    version: dev

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: WARN
  baud_rate: 0

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
  - platform: esphome

# Allow provisioning Wi-Fi via serial
# improv_serial:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device via WiFi AP.
captive_portal:

dashboard_import:
  package_import_url: github://esphome/example-configs/esphome-web/esp32.yaml@main
  import_full_config: true

# To have a "next url" for improv serial
web_server:

external_components:
  - source: github://NicodeSS/smart-desk@main
    components: [smart_desk]

uart:
  - # ESP <-> Handset
    id: handset
    rx_pin: GPIO16
    tx_pin: GPIO17
    baud_rate: 9600
    #rx_buffer_size: 8

  - # ESP <-> ControlBox
    id: controlbox
    rx_pin: GPIO18
    tx_pin: GPIO19
    baud_rate: 9600
    #rx_buffer_size: 8

smart_desk:
  id: smart_desk_ins
  uart_control: controlbox
  uart_handset: handset
  min_height: 62.0
  max_height: 127
  max_handset_timeout_count: 50
  default_tx_command_repeat: 8
  offline_tx_interval: 20ms
  move_tolerance: 0.4
  move_stop_margin_base: 0.3
  move_stop_margin_per_cm: 0.36
  move_stop_margin_min: 0.45
  move_stop_margin_max: 1.2
  move_endpoint_tolerance: 0.05
  move_command_repeat: 4
  move_command_interval: 80ms
  move_timeout: 30s
  move_stall_timeout: 3s
  move_stall_tolerance: 0.2
  manual_move_debug: false
  manual_move_debug_dump_frames: false

sensor:
  - platform: smart_desk
    id: smart_desk_ins
    height:
      name: Current Height
    target_height:
      name: Target Height Diagnostic
    learned_idle_interval:
      name: Learned Idle Interval

text_sensor:
  - platform: smart_desk
    id: smart_desk_ins
    status:
      name: Status
    display:
      name: Last Displayed
    movement:
      name: Movement
    last_move_result:
      name: Last Move Result

binary_sensor:
  - platform: smart_desk
    id: smart_desk_ins
    handset_online:
      name: Handset Connectivity

number:
  - platform: smart_desk
    smart_desk_id: smart_desk_ins
    id: target_height
    name: "Target Height"
    min_height: 62.0
    max_height: 127.0
    step: 0.5

# output:
#   - platform: gpio
#     pin: GPIO4
#     id: output1

button:
  - platform: smart_desk
    id: smart_desk_ins
    move_to_level_1:
      name: "Move to Level 1"
    move_to_level_2:
      name: "Move to Level 2"
    move_to_level_3:
      name: "Move to Level 3"
    move_to_level_4:
      name: "Move to Level 4"
    move_up:
      name: "Move Up"
    move_down:
      name: "Move Down"
    set_memory:
      name: "Set Memory"
    awake_handset:
      name: "Awake Handset"
    reset_desk:
      name: "Reset Desk"

  - platform: restart
    name: "Restart"

  # - platform: output
  #   name: "Trigger P line"
  #   output: output1
  #   duration: 80ms
